name: CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    check-changes:
        name: Check for Code Changes
        runs-on: ubuntu-latest
        outputs:
            code: ${{ steps.filter.outputs.code }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Path Filter
              id: filter
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      code:
                        - "**/*.js"
                        - "**/*.ts"
                        - "**/*.tsx"
                        - "**/*.jsx"
                        - "**/*.json"
                        - "**/*.css"
                        - "**/*.mjs"
                        - "**/*.cjs"

    quality:
        name: Quality (Lint)
        needs: check-changes
        if: needs.check-changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.33.0

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm lint

    test:
        name: Unit Tests
        needs: check-changes
        if: needs.check-changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.33.0

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Tests
              run: pnpm test

    build:
        name: Build
        needs: check-changes
        if: needs.check-changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Get latest release
              id: get_release
              run: |
                  LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
                  if [ -z "$LATEST_TAG" ]; then
                    LATEST_TAG="V$(node -p "require('./apps/web/package.json').version")"
                  fi
                  echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.33.0

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm build
              env:
                  NEXT_TELEMETRY_DISABLED: 1
                  SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
                  NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
                  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
                  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
                  NEXT_PUBLIC_APP_VERSION: ${{ steps.get_release.outputs.tag }}

    release:
        name: Release
        needs: [check-changes, quality, test, build]
        if: |
            always() &&
            github.ref == 'refs/heads/main' &&
            (needs.quality.result == 'success' || needs.quality.result == 'skipped') &&
            (needs.test.result == 'success' || needs.test.result == 'skipped') &&
            (needs.build.result == 'success' || needs.build.result == 'skipped')
        permissions:
            contents: write
            issues: write
            pull-requests: write
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.33.0

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Semantic Release
              uses: cycjimmy/semantic-release-action@v4
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
