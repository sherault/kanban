services:
  api:
    image: node:20-slim
    working_dir: /app
    command: >
      sh -c "corepack enable pnpm && 
             pnpm install && 
             pnpm --filter @kanban/shared build && 
             pnpm --filter @kanban/api dev"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      DATABASE_URL: file:./data/kanban.db
      PORT: 3001
      APP_URL: http://localhost:3000
      JWT_SECRET: dev-secret
      REFRESH_SECRET: dev-refresh-secret
    ports:
      - "3010:3001"
    restart: unless-stopped

  web:
    image: node:20-slim
    working_dir: /app
    command: >
      sh -c "corepack enable pnpm && 
             pnpm install && 
             pnpm --filter @kanban/web dev"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/.next
    environment:
      API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: http://localhost:3010
      APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
