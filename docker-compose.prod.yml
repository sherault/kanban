services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    env_file:
      - '.env'
    environment:
      DATABASE_URL: /data/kanban.db
      PORT: 3001
      APP_URL: https://${DOMAIN}
    volumes:
      - ./data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    environment:
      API_URL: http://api:3001
      APP_URL: https://${DOMAIN}
    depends_on:
      - api
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  caddy_data:
  caddy_config:
