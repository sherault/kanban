services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    env_file:
      - '.env'
    environment:
      DATABASE_URL: /data/kanban.db
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_SECRET: ${REFRESH_SECRET}
      PORT: 3001
      APP_URL: ${APP_URL:-http://localhost:3009}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
    volumes:
      - ./data:/data
    ports:
      - "3010:3001"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    environment:
      API_URL: http://api:3001
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3010}
    ports:
      - "3009:3000"
    depends_on:
      - api
    restart: unless-stopped
